<!DOCTYPE html>
<html>

<head>
    <title>Dehiwala Rental Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Daily Dehiwala Rentals</h1>
    <div id="listings"></div>

    <script>
        // Fetch the JSON file generated by the Python scraper
        fetch('listings.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('listings');
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <h3>${item.title}</h3>
                            <p class="price">${item.price}</p>
                            <a href="${item.link}" target="_blank">View Listing</a>
                        </div>
                    `;
                });
            });
    </script>
</body>

</html>
