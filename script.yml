name: Daily Dehiwala Rental Scraper

on:
  schedule:
    # Runs at 04:00 UTC (9:30 AM Sri Lanka Time) every single day
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub anytime

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add listings.json
        # Only commit if there are actually changes in the listings
        git diff-index --quiet HEAD || git commit -m "Automated daily listing update"
        git push